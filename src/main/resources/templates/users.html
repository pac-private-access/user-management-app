<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestionare Utilizatori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="sidebar">

    <div class="sidebar-header">
        <img src="/Pac_Logo_fara fundal.png" alt="PAC Logo" class="sidebar-logo">
        <div class="sidebar-title">
            <h5>Private Access PAC</h5>
        </div>
    </div>

    <a href="/dashboard" class="menu-item">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>
    <a href="/users" class="menu-item active-menu-item">
        <i class="fa-solid fa-users"></i>
        Utilizatori
    </a>
    <a href="/angajati" class="menu-item">
        <i class="fa-solid fa-id-badge"></i>
        Angajați
    </a>
    <a href="/rapoarte" class="menu-item">
        <i class="fa-solid fa-chart-column"></i>
        Rapoarte
    </a>
    <a href="/accestimpreal" class="menu-item">
        <i class="fa-solid fa-broadcast-tower"></i>
        Acces in timp real
    </a>
    <a href="/settings" class="menu-item">
        <i class="fa-solid fa-gear"></i>
        Setări
    </a>
    <a href="/cereri" class="menu-item">
        <i class="fa-solid fa-mobile-screen"></i> Cereri acces
    </a>
    <a href="/logout" class="menu-item">
        <i class="fa-solid fa-right-from-bracket"></i>
        Deconectare
    </a>

</div>

<div class="content">

    <h2>Gestionare Utilizatori</h2>

    <div class="row mt-4">

        <div class="col-md-3">
            <div class="card card-stat p-3">
                <h3 th:text="${activeWebUsers}">0</h3>
                <p>Utilizatori activi</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-stat p-3">
                <h3 th:text="${entriesToday}">0</h3>
                <p>Accesări azi</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-stat p-3">
                <h3 th:text="${refusedToday}">0</h3>
                <p>Tentative refuzate</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-stat p-3">
                <h3 th:text="${lastAccess}">—</h3>
                <p>Ultima accesare</p>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nume</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4">Nu există utilizatori înregistrați</td>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.fullName}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${rolesByUserId[user.id]}">—</td>
                    <td>
                        <span th:if="${user.isActive()}"  class="badge bg-success">Activ</span>
                        <span th:unless="${user.isActive()}" class="badge bg-secondary">Inactiv</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    const theme = localStorage.getItem('theme');
    if (theme === 'dark') {
        document.body.classList.add('dark-mode');
    }
</script>

</body>
</html>
