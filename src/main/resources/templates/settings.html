<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Setări - PAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('settings')}"></div>

<div class="content">

    <h2>Setări</h2>

    <div class="row mt-4" style="max-width:500px;">

        <div class="mb-3">
            <label class="form-label">Nume</label>
            <input class="form-control" th:value="${currentUserName}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" th:value="${currentUserEmail}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Rol</label>
            <input class="form-control" th:value="${currentUserRoles}" readonly>
        </div>

        <hr class="my-4">

        <div class="mb-2">
            <label class="form-label">Temă</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="theme" id="lightTheme" checked>
            <label class="form-check-label" for="lightTheme">Temă deschisă</label>
        </div>
        <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="theme" id="darkTheme">
            <label class="form-check-label" for="darkTheme">Temă închisă</label>
        </div>
        <div>
            <button id="saveTheme" class="btn btn-primary">Salvează tema</button>
        </div>

    </div>
</div>

<script>
    const lightTheme = document.getElementById('lightTheme');
    const darkTheme  = document.getElementById('darkTheme');
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') darkTheme.checked = true;

    document.getElementById('saveTheme').addEventListener('click', () => {
        localStorage.setItem('theme', darkTheme.checked ? 'dark' : 'light');
        location.reload();
    });
    if (saved === 'dark') document.body.classList.add('dark-mode');
</script>
</body>
</html>
