<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Cereri Acces - PAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('cereri')}"></div>

<div class="content">

    <h1 class="page-title">Cereri de acces mobil</h1>

    <!-- Cereri în așteptare -->
    <div class="card p-4 mb-4">
        <div class="d-flex align-items-center gap-2 mb-3">
            <h5 style="font-weight:700;margin:0;">
                <i class="fa-solid fa-clock" style="color:#F59E0B;margin-right:8px;"></i>
                În așteptare
            </h5>
            <span class="badge bg-warning text-dark" th:text="${#lists.size(pending)}">0</span>
        </div>

        <div th:if="${#lists.isEmpty(pending)}" class="text-center text-muted py-4">
            <i class="fa-solid fa-check-circle"
               style="font-size:32px;color:#10B981;display:block;margin-bottom:8px;"></i>
            Nicio cerere în așteptare
        </div>

        <table th:unless="${#lists.isEmpty(pending)}" class="table mb-0">
            <thead>
            <tr>
                <th>Angajat</th>
                <th>Device ID (PUK)</th>
                <th>Data înregistrării</th>
                <th>Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${pending}">
                <td>
                    <i class="fa-solid fa-user" style="color:#2563EB;margin-right:6px;"></i>
                    <span th:with="emp=${employeeRepo.findById(s.employeeId).orElse(null)}">
                        <span th:if="${emp != null}" th:text="${emp.firstName + ' ' + emp.lastName}">—</span>
                        <span th:unless="${emp != null}" class="text-muted">
                            ID: <code th:text="${s.employeeId}"></code>
                        </span>
                    </span>
                </td>
                <td><code th:text="${s.pukCode}">—</code></td>
                <td th:text="${#temporals.format(s.registeredAt, 'dd.MM.yyyy HH:mm')}">—</td>
                <td>
                    <form th:action="@{/cereri/{id}/approve(id=${s.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-success" style="border-radius:8px;">
                            <i class="fa-solid fa-check"></i> Aprobă
                        </button>
                    </form>
                    <form th:action="@{/cereri/{id}/delete(id=${s.id})}" method="post"
                          style="display:inline;" onsubmit="return confirm('Ștergi cererea?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius:8px;">
                            <i class="fa-solid fa-trash"></i> Respinge
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Dispozitive aprobate -->
    <div class="card p-4">
        <div class="d-flex align-items-center gap-2 mb-3">
            <h5 style="font-weight:700;margin:0;">
                <i class="fa-solid fa-mobile-screen-button" style="color:#10B981;margin-right:8px;"></i>
                Dispozitive aprobate
            </h5>
            <span class="badge bg-success" th:text="${#lists.size(approved)}">0</span>
        </div>

        <div th:if="${#lists.isEmpty(approved)}" class="text-center text-muted py-4">
            Niciun dispozitiv aprobat încă
        </div>

        <table th:unless="${#lists.isEmpty(approved)}" class="table mb-0">
            <thead>
            <tr>
                <th>Angajat</th>
                <th>Device ID (PUK)</th>
                <th>Data aprobării</th>
                <th>Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${approved}">
                <td>
                    <i class="fa-solid fa-user" style="color:#2563EB;margin-right:6px;"></i>
                    <span th:with="emp=${employeeRepo.findById(s.employeeId).orElse(null)}">
                        <span th:if="${emp != null}" th:text="${emp.firstName + ' ' + emp.lastName}">—</span>
                        <span th:unless="${emp != null}" class="text-muted">
                            ID: <code th:text="${s.employeeId}"></code>
                        </span>
                    </span>
                </td>
                <td><code th:text="${s.pukCode}">—</code></td>
                <td th:text="${#temporals.format(s.registeredAt, 'dd.MM.yyyy HH:mm')}">—</td>
                <td>
                    <form th:action="@{/cereri/{id}/revoke(id=${s.id})}" method="post"
                          style="display:inline;" onsubmit="return confirm('Revocare acces?')">
                        <button type="submit" class="btn btn-sm btn-outline-warning" style="border-radius:8px;">
                            <i class="fa-solid fa-ban"></i> Revocă
                        </button>
                    </form>
                    <form th:action="@{/cereri/{id}/delete(id=${s.id})}" method="post"
                          style="display:inline;" onsubmit="return confirm('Ștergi dispozitivul?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius:8px;">
                            <i class="fa-solid fa-trash"></i> Șterge
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(() => location.reload(), 30000);
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>
</body>
</html>
