
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Login - PAC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

</head>

<body class="login-page">

<div class="login-container">

    <div class="logo-section">

        <img src="/Pac_Logo.png" alt="PAC" class="login-logo">

        <h1>PRIVATE ACCESS PAC</h1>

        <p>CONTROL ACCES INTELIGENT</p>

    </div>

    <div class="login-card">

        <h2>Autentificare</h2>

        <form action="/login" method="post">

            <div class="input-group mb-3">

                <span class="input-group-text">
                    <i class="fa-solid fa-user"></i>
                </span>

                <input type="email" class="form-control" name="email" placeholder="Email" required>

            </div>

            <div class="input-group mb-4">

                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input type="password" class="form-control" name="parola" placeholder="Parola" required>

            </div>

            <button type="submit"
                    class="btn btn-primary login-btn">

                <i class="fa-solid fa-right-to-bracket"></i>
                Login

            </button>

        </form>

        <div class="features">

            <div>
                <i class="fa-solid fa-shield-halved"></i>
                <span>Siguranță</span>
            </div>

            <div>
                <i class="fa-solid fa-user-check"></i>
                <span>Control</span>
            </div>

            <div>
                <i class="fa-solid fa-chart-line"></i>
                <span>Acces Inteligent</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
