<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestionare Utilizatori</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

    

</head>
<body>

    <div class="sidebar">

        <h4>Private Access PAC</h4>

        <a href="/dashboard" class="menu-item">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <a href="/users" class="menu-item">
            <i class="fa-solid fa-users"></i>
            Utilizatori
        </a>

        <a href="/rapoarte" class="menu-item">
            <i class="fa-solid fa-chart-column"></i>
            Rapoarte
        </a>

        <a href="/accestimpreal" class="menu-item">
            <i class="fa-solid fa-broadcast-tower"></i>
            Acces in timp real
        </a>

        <a href="/settings" class="menu-item">
            <i class="fa-solid fa-gear"></i>
            Setări
        </a>


        <a href="/logout" class="menu-item">
            <i class="fa-solid fa-right-from-bracket"></i>
            Deconectare
        </a>

    </div>
<div class="content">
        <h2>Generare Raport</h2>

    <div>
        <form action="/reports" method="post">

            <label>Perioadă:</label>

            <select name="perioada">
                <option value="Zi">Zi</option>
                <option value="Săptămână">Săptămână</option>
                <option value="Lună">Lună</option>
            </select>

            <button type="submit">      {# de implementat metoda #}
                Generează raport
            </button>

        </form>
    </div>
        <div th:if="${mesaj}">
            <h3 th:text="${mesaj}"></h3>
        </div>
</div>

    <script>

    const theme =
        localStorage.getItem('theme');

    if(theme === 'dark'){
        document.body.classList.add(
            'dark-mode'
        );
    }

    </script>
</body>
</html>
