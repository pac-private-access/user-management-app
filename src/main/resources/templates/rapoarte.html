<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Rapoarte - PAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('rapoarte')}"></div>

<div class="content">

    <h2>Generare Raport</h2>

    <form th:action="@{/rapoarte}" method="get" class="row g-3 mt-2" style="max-width:500px;">
        <div class="col-md-6">
            <label class="form-label">De la</label>
            <input type="date" class="form-control" name="from" th:value="${from}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Până la</label>
            <input type="date" class="form-control" name="to" th:value="${to}" required>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-magnifying-glass"></i> Generează raport
            </button>
        </div>
    </form>

    <div th:if="${reportRows != null}" class="mt-4">
        <p th:if="${#lists.isEmpty(reportRows)}" class="text-muted">
            Nu există evenimente în perioada selectată.
        </p>
        <table th:unless="${#lists.isEmpty(reportRows)}" class="table table-striped">
            <thead>
                <tr>
                    <th>Data / Ora</th>
                    <th>Angajat</th>
                    <th>Divizie</th>
                    <th>Tip</th>
                    <th>Autorizat</th>
                    <th>Metodă</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${reportRows}">
                    <td th:text="${row.time}"></td>
                    <td th:text="${row.employee}"></td>
                    <td th:text="${row.division}"></td>
                    <td th:text="${row.type}"></td>
                    <td>
                        <span th:if="${row.authorized == 'Da'}"    class="badge bg-success">Da</span>
                        <span th:unless="${row.authorized == 'Da'}" class="badge bg-danger">Nu</span>
                    </td>
                    <td th:text="${row.method}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>
</body>
</html>
