<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Acces în timp real - PAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <!-- CSRF token for fetch() calls -->
    <meta name="_csrf"        th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('accestimpreal')}"></div>

<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0">Acces în timp real</h1>
        <div class="d-flex align-items-center gap-2">
            <!-- Manual gate trigger button -->
            <button id="btnTrigger" class="btn btn-success"
                    style="border-radius:8px;" onclick="triggerGate()">
                <i class="fa-solid fa-door-open"></i> Deschide poarta
            </button>
            <div id="connectionStatus" class="badge bg-warning text-dark px-3 py-2" style="font-size:13px;">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Conectare...
            </div>
        </div>
    </div>

    <!-- Statistici sesiune -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card-stat p-3 text-center">
                <h3 id="totalSesiune">0</h3>
                <p>Total sesiune</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat p-3 text-center">
                <h3 id="intrariSesiune" style="color:#10B981;">0</h3>
                <p>Intrări</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat p-3 text-center">
                <h3 id="iesiriSesiune" style="color:#EF4444;">0</h3>
                <p>Ieșiri</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-stat p-3 text-center">
                <h3 id="refuzateSesiune" style="color:#F59E0B;">0</h3>
                <p>Refuzate</p>
            </div>
        </div>
    </div>

    <!-- Ultimul eveniment (portar view) -->
    <div class="card p-4 mb-4" id="lastEventCard" style="display:none!important;">
        <h5 style="font-weight:700;margin-bottom:16px;">
            <i class="fa-solid fa-door-open" style="color:#2563EB;margin-right:8px;"></i>
            Ultimul eveniment
        </h5>
        <div class="d-flex align-items-center gap-4">
            <div id="lastEventIcon"
                 style="width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <h3 id="lastEventName" style="font-weight:700;margin-bottom:4px;">—</h3>
                <p id="lastEventBadge" style="color:#64748B;margin-bottom:4px;">Badge: —</p>
                <p id="lastEventTime" style="color:#94A3B8;font-size:13px;">—</p>
            </div>
            <div class="ms-auto">
                <div id="lastEventResult" style="font-size:48px;font-weight:800;">—</div>
            </div>
        </div>
    </div>

    <!-- Tabel evenimente live -->
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 style="font-weight:700;margin:0;">
                <i class="fa-solid fa-list" style="color:#2563EB;margin-right:8px;"></i>
                Evenimente live
            </h5>
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="clearEvents()" style="border-radius:8px;">
                <i class="fa-solid fa-trash"></i> Curăță
            </button>
        </div>
        <table class="table mb-0">
            <thead>
            <tr>
                <th>Ora</th><th>Angajat</th><th>Badge</th>
                <th>Direcție</th><th>Metodă</th><th>Status</th>
            </tr>
            </thead>
            <tbody id="eventsBody">
            <tr id="noEvents">
                <td colspan="6" class="text-center text-muted py-4">
                    <i class="fa-solid fa-satellite-dish" style="font-size:24px;display:block;margin-bottom:8px;"></i>
                    Aștept evenimente...
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    let stompClient = null;
    let total = 0, intrari = 0, iesiri = 0, refuzate = 0;

    // ── WebSocket ────────────────────────────────────────────────────────
    function connect() {
        const socket = new SockJS('/ws/monitor');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {
            const st = document.getElementById('connectionStatus');
            st.className = 'badge bg-success px-3 py-2';
            st.innerHTML = '<i class="fa-solid fa-circle"></i> Conectat — Live';

            stompClient.subscribe('/topic/monitor', function (msg) {
                addEvent(JSON.parse(msg.body));
            });
        }, function () {
            const st = document.getElementById('connectionStatus');
            st.className = 'badge bg-danger px-3 py-2';
            st.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Deconectat — reîncerc...';
            setTimeout(connect, 5000);
        });
    }

    function addEvent(event) {
        document.getElementById('noEvents')?.remove();

        total++;
        if (event.direction === 'ENTRY') intrari++; else iesiri++;
        if (event.result === 'DENIED') refuzate++;

        document.getElementById('totalSesiune').textContent   = total;
        document.getElementById('intrariSesiune').textContent = intrari;
        document.getElementById('iesiriSesiune').textContent  = iesiri;
        document.getElementById('refuzateSesiune').textContent = refuzate;

        const card = document.getElementById('lastEventCard');
        card.style.setProperty('display', 'block', 'important');

        document.getElementById('lastEventName').textContent  = `${event.firstName} ${event.lastName}`;
        document.getElementById('lastEventBadge').textContent = 'Badge: ' + (event.badgeNumber || '—');
        document.getElementById('lastEventTime').textContent  = new Date().toLocaleTimeString('ro-RO');

        const iconEl   = document.getElementById('lastEventIcon');
        const resultEl = document.getElementById('lastEventResult');
        if (event.result === 'GRANTED') {
            iconEl.style.background   = '#ECFDF5'; iconEl.style.color = '#10B981';
            resultEl.style.color = '#10B981'; resultEl.textContent = '✓ PERMIS';
            card.style.borderColor = '#10B981';
        } else {
            iconEl.style.background   = '#FEF2F2'; iconEl.style.color = '#EF4444';
            resultEl.style.color = '#EF4444'; resultEl.textContent = '✗ REFUZAT';
            card.style.borderColor = '#EF4444';
        }

        const methodMap = {
            'bluetooth_esp32': '<span class="badge bg-info text-dark">BLE + ESP32</span>',
            'mobile':          '<span class="badge bg-primary">Mobil</span>',
        };
        const methodLabel = methodMap[event.accessMethod] || '<span class="badge bg-secondary">BLE + PC</span>';

        const ora       = new Date(event.timestamp).toLocaleTimeString('ro-RO');
        const rowClass  = event.result === 'GRANTED' ? 'table-success' : 'table-danger';
        const dirIcon   = event.direction === 'ENTRY'
            ? '<span style="color:#10B981;font-weight:600;"><i class="fa-solid fa-right-to-bracket"></i> Intrare</span>'
            : '<span style="color:#EF4444;font-weight:600;"><i class="fa-solid fa-right-from-bracket"></i> Ieșire</span>';
        const statusBadge = event.result === 'GRANTED'
            ? '<span class="badge bg-success">PERMIS</span>'
            : '<span class="badge bg-danger">REFUZAT</span>';

        const tbody = document.getElementById('eventsBody');
        const row   = document.createElement('tr');
        row.className = rowClass;
        row.style.animation = 'flash 0.6s';
        row.innerHTML = `
            <td><strong style="font-family:monospace;">${ora}</strong></td>
            <td><i class="fa-solid fa-user" style="color:#2563EB;margin-right:6px;"></i>${event.firstName} ${event.lastName}</td>
            <td><code>${event.badgeNumber || '—'}</code></td>
            <td>${dirIcon}</td>
            <td>${methodLabel}</td>
            <td>${statusBadge}</td>`;
        tbody.insertBefore(row, tbody.firstChild);

        const rows = tbody.querySelectorAll('tr');
        if (rows.length > 100) tbody.removeChild(rows[rows.length - 1]);

        playBeep(event.result === 'GRANTED');
    }

    function clearEvents() {
        document.getElementById('eventsBody').innerHTML = `
            <tr id="noEvents">
                <td colspan="6" class="text-center text-muted py-4">
                    <i class="fa-solid fa-satellite-dish" style="font-size:24px;display:block;margin-bottom:8px;"></i>
                    Aștept evenimente...
                </td>
            </tr>`;
        total = intrari = iesiri = refuzate = 0;
        ['totalSesiune','intrariSesiune','iesiriSesiune','refuzateSesiune']
            .forEach(id => document.getElementById(id).textContent = '0');
        document.getElementById('lastEventCard').style.setProperty('display','none','important');
    }

    function playBeep(granted) {
        try {
            const ctx  = new AudioContext();
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = granted ? 880 : 220;
            gain.gain.value = 0.08;
            osc.start(); osc.stop(ctx.currentTime + 0.25);
        } catch (e) {}
    }

    // ── Manual gate trigger ──────────────────────────────────────────────
    function triggerGate() {
        const btn = document.getElementById('btnTrigger');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Se deschide...';

        const csrfToken  = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        fetch('/gate/trigger', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            }
        })
        .then(async r => {
            const text = await r.text();
            if (r.ok) {
                btn.className = 'btn btn-success';
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Deschis!';
            } else {
                btn.className = 'btn btn-danger';
                btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Eroare ESP32';
                console.error('Gate trigger error:', text);
            }
        })
        .catch(err => {
            btn.className = 'btn btn-danger';
            btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Eroare rețea';
            console.error(err);
        })
        .finally(() => {
            setTimeout(() => {
                btn.disabled = false;
                btn.className = 'btn btn-success';
                btn.innerHTML = '<i class="fa-solid fa-door-open"></i> Deschide poarta';
            }, 3000);
        });
    }

    connect();
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>

<style>
@keyframes flash {
    0%   { opacity:0; transform:translateY(-4px); }
    100% { opacity:1; transform:translateY(0); }
}
</style>
</body>
</html>
