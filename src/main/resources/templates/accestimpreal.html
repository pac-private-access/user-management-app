<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestionare Utilizatori</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

    

</head>
<body>

    <div class="sidebar">

        <h4>Private Access PAC</h4>

        <a href="/dashboard" class="menu-item">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <a href="/users" class="menu-item">
            <i class="fa-solid fa-users"></i>
            Utilizatori
        </a>

        <a href="/rapoarte" class="menu-item">
            <i class="fa-solid fa-chart-column"></i>
            Rapoarte
        </a>

        <a href="/accestimpreal" class="menu-item">
            <i class="fa-solid fa-broadcast-tower"></i>
            Acces in timp real
        </a>

        <a href="/settings" class="menu-item">
            <i class="fa-solid fa-gear"></i>
            Setări
        </a>


        <a href="/logout" class="menu-item">
            <i class="fa-solid fa-right-from-bracket"></i>
            Deconectare
        </a>

    </div>

    <div class="content">

        <table class="table">
        <thead>
            <tr>
                <th>Nume</th>
                <th>Departament</th>
                <th>Direcție</th>
                <th>Ora</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="log : ${recentLogs}">
                <td th:text="${log.employee.firstName + ' ' + log.employee.lastName}">Nume</td>
                <td th:text="${log.employee.department}">Departament</td>
                <td th:text="${log.direction}">Direcție</td>
                <td th:text="${#dates.format(log.timestamp, 'HH:mm')}">Ora</td>
                <td th:text="${log.result}">Status</td>
            </tr>
        </tbody>
    </table>

    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const socket = new SockJS('/ws/monitor');
        const stompClient = Stomp.over(socket);
        stompClient.connect({}, function(frame) {
            stompClient.subscribe('/topic/monitor', function(message) {
                const event = JSON.parse(message.body);
                const tbody = document.querySelector('table.table tbody');
                const row = document.createElement('tr');

                const nameTd = document.createElement('td');
                nameTd.textContent = event.employeeFirstName + ' ' + event.employeeLastName;

                const deptTd = document.createElement('td');
                deptTd.textContent = event.department || 'N/A';

                const directionTd = document.createElement('td');
                directionTd.textContent = event.direction;

                const timeTd = document.createElement('td');
                timeTd.textContent = event.timestamp;

                const statusTd = document.createElement('td');
                statusTd.textContent = event.result;

                row.appendChild(nameTd);
                row.appendChild(deptTd);
                row.appendChild(directionTd);
                row.appendChild(timeTd);
                row.appendChild(statusTd);
                tbody.prepend(row);
                while (tbody.children.length > 15) {
                    tbody.removeChild(tbody.lastChild);
                }
            });
        });
    });
    </script>
    <script>
    const theme = localStorage.getItem('theme');
    if (theme === 'dark') {
        document.body.classList.add('dark-mode');
    }
    </script>
</body>
</html>
