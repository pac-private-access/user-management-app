<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Acces în Timp Real - PAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="sidebar">

    <div class="sidebar-header">
        <img src="/Pac_Logo_fara fundal.png" alt="PAC Logo" class="sidebar-logo">
        <div class="sidebar-title">
            <h5>Private Access PAC</h5>
        </div>
    </div>

    <a href="/dashboard" class="menu-item">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>
    <a href="/users" class="menu-item">
        <i class="fa-solid fa-users"></i>
        Utilizatori
    </a>
    <a href="/angajati" class="menu-item">
        <i class="fa-solid fa-id-badge"></i>
        Angajați
    </a>
    <a href="/rapoarte" class="menu-item">
        <i class="fa-solid fa-chart-column"></i>
        Rapoarte
    </a>
    <a href="/accestimpreal" class="menu-item active-menu-item">
        <i class="fa-solid fa-broadcast-tower"></i>
        Acces in timp real
    </a>
    <a href="/settings" class="menu-item">
        <i class="fa-solid fa-gear"></i>
        Setări
    </a>
    <a href="/logout" class="menu-item">
        <i class="fa-solid fa-right-from-bracket"></i>
        Deconectare
    </a>

</div>

<div class="content">

    <h2>
        Acces în Timp Real
        <span id="ws-status" class="badge bg-secondary ms-2" style="font-size:0.6rem; vertical-align:middle;">Conectare...</span>
    </h2>

    <table class="table" id="events-table">
        <thead>
            <tr>
                <th>Angajat</th>
                <th>Badge</th>
                <th>Direcție</th>
                <th>Ora</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="events-body">
            <tr id="empty-row">
                <td colspan="5" class="text-muted">Așteptând evenimente de acces...</td>
            </tr>
        </tbody>
    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const wsStatus = document.getElementById('ws-status');
    const eventsBody = document.getElementById('events-body');
    const emptyRow = document.getElementById('empty-row');

    const socket = new SockJS('/ws/monitor');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect({}, function () {
        wsStatus.textContent = 'Conectat';
        wsStatus.className = 'badge bg-success ms-2';

        stompClient.subscribe('/topic/monitor', function (message) {
            const event = JSON.parse(message.body);
            addEventRow(event);
        });
    }, function () {
        wsStatus.textContent = 'Deconectat';
        wsStatus.className = 'badge bg-danger ms-2';
    });

    function addEventRow(event) {
        if (emptyRow) emptyRow.remove();

        const now = new Date();
        const time = now.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const name = (event.firstName || '') + ' ' + (event.lastName || '');
        const direction = event.direction === 'entry' ? 'Intrare' : 'Ieșire';
        const granted = event.result === 'GRANTED';

        const statusBadge = granted
            ? '<span class="badge bg-success">Acordat</span>'
            : '<span class="badge bg-danger">Refuzat</span>';

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${name.trim() || 'Necunoscut'}</td>
            <td>${event.badgeNumber || '—'}</td>
            <td>${direction}</td>
            <td>${time}</td>
            <td>${statusBadge}</td>
        `;
        eventsBody.insertBefore(row, eventsBody.firstChild);

        // Keep table manageable — drop rows beyond 50
        const rows = eventsBody.querySelectorAll('tr');
        if (rows.length > 50) rows[rows.length - 1].remove();
    }

    const theme = localStorage.getItem('theme');
    if (theme === 'dark') document.body.classList.add('dark-mode');
</script>

</body>
</html>
