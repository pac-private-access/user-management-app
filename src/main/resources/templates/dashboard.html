<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard - PAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

<div class="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-title mb-0">Dashboard</h1>
            <span class="text-muted" style="font-size:13px;">
                Bun venit, <strong th:text="${currentUserName}">Admin</strong>
            </span>
        </div>
        <span style="font-size:13px;color:#64748B;" id="currentTime"></span>
    </div>

    <!-- Statistici principale -->
    <div class="row g-3 mb-4">
        <div class="col-md-2">
            <div class="card-stat p-3">
                <div class="stat-icon" style="background:#EFF6FF;">
                    <i class="fa-solid fa-users" style="color:#2563EB;"></i>
                </div>
                <h3 th:text="${totalAngajati}">0</h3>
                <p>Total angajați</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-stat p-3">
                <div class="stat-icon" style="background:#ECFDF5;">
                    <i class="fa-solid fa-building-user" style="color:#10B981;"></i>
                </div>
                <h3 th:text="${inCladireAcum}" style="color:#10B981;">0</h3>
                <p>În clădire acum</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-stat p-3">
                <div class="stat-icon" style="background:#ECFDF5;">
                    <i class="fa-solid fa-right-to-bracket" style="color:#10B981;"></i>
                </div>
                <h3 th:text="${intrariAzi}" style="color:#10B981;">0</h3>
                <p>Intrări azi</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-stat p-3">
                <div class="stat-icon" style="background:#FEF2F2;">
                    <i class="fa-solid fa-right-from-bracket" style="color:#EF4444;"></i>
                </div>
                <h3 th:text="${iesiriAzi}" style="color:#EF4444;">0</h3>
                <p>Ieșiri azi</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-stat p-3">
                <div class="stat-icon" style="background:#FFFBEB;">
                    <i class="fa-solid fa-ban" style="color:#F59E0B;"></i>
                </div>
                <h3 th:text="${refuzateAzi}" style="color:#F59E0B;">0</h3>
                <p>Refuzate azi</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-stat p-3">
                <div class="stat-icon" style="background:#F5F3FF;">
                    <i class="fa-solid fa-circle-check" style="color:#8B5CF6;"></i>
                </div>
                <h3 th:text="${activeWebUsers}" style="color:#8B5CF6;">0</h3>
                <p>Conturi active</p>
            </div>
        </div>
    </div>

    <!-- Grafic + distribuție -->
    <div class="row g-3 mb-4">
        <div class="col-md-8">
            <div class="card p-4">
                <h5 style="font-weight:700;margin-bottom:16px;">
                    <i class="fa-solid fa-chart-line" style="color:#2563EB;margin-right:8px;"></i>
                    Accesări ultimele 7 zile
                </h5>
                <canvas id="accessChart" height="80"></canvas>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <h5 style="font-weight:700;margin-bottom:16px;">
                    <i class="fa-solid fa-pie-chart" style="color:#2563EB;margin-right:8px;"></i>
                    Distribuție azi
                </h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Activitate recentă -->
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 style="font-weight:700;margin:0;">
                <i class="fa-solid fa-clock-rotate-left" style="color:#2563EB;margin-right:8px;"></i>
                Activitate recentă
            </h5>
            <a href="/accestimpreal" class="btn btn-sm btn-outline-primary" style="border-radius:8px;">
                <i class="fa-solid fa-broadcast-tower"></i> Live
            </a>
        </div>
        <table class="table mb-0">
            <thead>
            <tr>
                <th>Ora</th><th>Angajat</th><th>Tip</th><th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${recentActivity}">
                <td style="font-family:monospace;font-size:13px;"
                    th:text="${#temporals.format(
                            T(java.time.OffsetDateTime).parse(row[0].toString()),
                            'HH:mm:ss')}">--:--
                </td>
                <td>
                    <i class="fa-solid fa-user" style="color:#2563EB;margin-right:6px;"></i>
                    <span th:text="${row[3]}">Nume</span>
                </td>
                <td>
                    <span th:if="${row[1] == 'entry'}" style="color:#10B981;font-weight:600;">
                        <i class="fa-solid fa-right-to-bracket"></i> Intrare
                    </span>
                    <span th:unless="${row[1] == 'entry'}" style="color:#EF4444;font-weight:600;">
                        <i class="fa-solid fa-right-from-bracket"></i> Ieșire
                    </span>
                </td>
                <td>
                    <span th:if="${row[2].toString() == 'true'}" class="badge bg-success">Permis</span>
                    <span th:unless="${row[2].toString() == 'true'}" class="badge bg-danger">Refuzat</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(recentActivity)}">
                <td colspan="4" class="text-center text-muted py-3">Nicio activitate recentă</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const labels  = /*[[${chartLabels}]]*/ [];
    const values  = /*[[${chartValues}]]*/ [];
    const intrari = /*[[${intrariAzi}]]*/ 0;
    const iesiri  = /*[[${iesiriAzi}]]*/ 0;

    new Chart(document.getElementById('accessChart'), {
        type: 'bar',
        data: {
            labels: labels.length ? labels : ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'],
            datasets: [{
                label: 'Accesări',
                data: values.length ? values : [0,0,0,0,0,0,0],
                backgroundColor: 'rgba(37,99,235,0.15)',
                borderColor: '#2563EB', borderWidth: 2, borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: {legend: {display: false}},
            scales: { y: {beginAtZero: true, grid: {color:'#F1F5F9'}}, x: {grid:{display:false}} }
        }
    });

    new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: {
            labels: ['Intrări','Ieșiri'],
            datasets: [{
                data: [intrari||1, iesiri||1],
                backgroundColor: ['#10B981','#EF4444'], borderWidth: 0
            }]
        },
        options: { responsive:true, plugins:{legend:{position:'bottom'}}, cutout:'65%' }
    });

    function updateTime() {
        const now = new Date();
        document.getElementById('currentTime').textContent =
            now.toLocaleDateString('ro-RO',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
            + ' ' + now.toLocaleTimeString('ro-RO');
    }
    updateTime(); setInterval(updateTime, 1000);

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>
<style>
.stat-icon { width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px; }
</style>
</body>
</html>
